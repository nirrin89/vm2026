<style>
:root{
  --bg:#fafaf7;
  --surface:#ffffff;
  --text:#1a1a1a;
  --muted:#666;
  --faint:#999;

  --border-strong:rgba(0,0,0,0.18);

  --yle-bg:#E6F1FB;

}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#161616;
    --surface:#1f1f1f;
    --text:#f0f0f0;
    --muted:#a0a0a0;
    --faint:#707070;
    --border:rgba(255,255,255,0.08);

    --yle:#85B7EB;

}
*{box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);

  padding:0;
  line-height:1.5;

}
.wrap{max-width:680px;margin:0 auto;padding:calc(28px + env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;}
h1{font-size:22px;font-weight:500;margin:0;letter-spacing:-0.01em;}
.sub-date{font-size:11px;color:var(--faint);}
.sub{font-size:12px;color:var(--muted);margin:0 0 28px;}
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{
  font-size:12px;
  padding:5px 12px;
  border-radius:8px;
  border:0.5px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  font-family:inherit;
  transition:background 0.1s;
}
.tab:hover{background:var(--surface);}
.tab.active{color:var(--text);border-color:var(--border-strong);background:var(--surface);}
.legend{font-size:11px;color:var(--faint);}
.legend .yle-key{color:var(--yle);font-weight:500;}
.day{
  display:flex;

  gap:10px;

}
.day.is-today{border-bottom-color:var(--today-accent);border-bottom-width:1.5px;}
.day.is-today .day-name{color:var(--today-accent);}

.day-date{font-size:11px;color:var(--faint);}
.day-today{

.team-page-head{display:flex;align-items:center;gap:10px;margin:0 0 18px;}

.scorers{margin-top:6px;}
.scorer-row{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:baseline;padding:9px 0;border-top:0.5px solid var(--border);font-size:14px;}

.scorer-rank{font-size:11px;color:var(--faint);text-align:center;font-variant-numeric:tabular-nums;}
.scorer-team{font-size:11px;color:var(--muted);margin-left:6px;}

.scorer-loading{padding:16px 0;font-size:13px;color:var(--muted);text-align:center;}

<script>
const M = [
  ["2026-06-11","Må","22:00","A","Mexiko","Sydafrika","2–2","played","MTV"],
  ["2026-06-12","Fr","19:00","B","Kanada","Bosnien-Hercegovina","1–1","played","YLE"],
  ["2026-06-12","Fr","22:00","D","USA","Paraguay","4–1","played","YLE"],
  ["2026-06-13","Lö","19:00","B","Schweiz","Qatar","1–1","played","MTV"],
  ["2026-06-13","Lö","22:00","C","Brasilien","Marocko","1–1","played","MTV"],
  ["2026-06-13","Lö","01:00+1","C","Haiti","Skottland","0–1","played","MTV"],
  ["2026-06-13","Lö","04:00+1","D","Australien","Turkiet","2–0","played","MTV"],
  ["2026-06-14","Sö","19:00","E","Tyskland","Curaçao","7–1","played","YLE"],
  ["2026-06-14","Sö","22:00","F","Nederländerna","Japan","2–2","played","YLE"],
  ["2026-06-14","Sö","01:00+1","E","Elfenbenskusten","Ecuador","1–0","played","YLE"],
  ["2026-06-14","Sö","04:00+1","F","Sverige","Tunisien","5–1","played","YLE"],
  ["2026-06-15","Må","19:00","H","Spanien","Kap Verde","0–0","played","MTV"],
  ["2026-06-15","Må","22:00","G","Belgien","Egypten","1–1","played","MTV"],
  ["2026-06-15","Må","01:00+1","H","Saudiarabien","Uruguay","1–1","played","MTV"],
  ["2026-06-15","Må","04:00+1","G","Iran","Nya Zeeland","2–2","played","MTV"],
  ["2026-06-16","Ti","22:00","I","Frankrike","Senegal","3–1","played","YLE"],
  ["2026-06-16","Ti","01:00+1","I","Irak","Norge","1–4","played","YLE"],
  ["2026-06-16","Ti","04:00+1","J","Argentina","Algeriet","3–0","played","YLE"],
  ["2026-06-16","Ti","07:00+1","J","Österrike","Jordanien","3–1","played","YLE"],
  ["2026-06-17","On","20:00","K","Portugal","DR Kongo","1–1","played","MTV"],
  ["2026-06-17","On","23:00","K","England","Kroatien","4–2","played","MTV"],
  ["2026-06-17","On","02:00+1","L","Ghana","Panama","1–0","played","MTV"],
  ["2026-06-17","On","05:00+1","L","Uzbekistan","Colombia","1–3","played","MTV"],
  ["2026-06-18","To","19:00","A","Tjeckien","Sydafrika","1–1","played","YLE"],
  ["2026-06-18","To","22:00","B","Schweiz","Bosnien-Hercegovina","4–1","played","YLE"],
  ["2026-06-18","To","01:00+1","B","Kanada","Qatar","6–0","played","YLE"],
  ["2026-06-18","To","04:00+1","A","Mexiko","Sydkorea","1–0","played","YLE"],
].map(r=>({date:r[0],day:r[1],time:r[2],g:r[3],h:r[4],a:r[5],s:r[6],st:r[7],b:r[8]}));

const dayLabels = {"Må":"Måndag","Ti":"Tisdag","On":"Onsdag","To":"Torsdag","Fr":"Fredag","Lö":"Lördag","Sö":"Söndag"};

// --- Live data (TheSportsDB free API, keyless test key "3") ---
const SV2EN = {
  "Mexiko":"Mexico","Sydafrika":"South Africa","Kanada":"Canada","Bosnien-Hercegovina":"Bosnia and Herzegovina",
  "USA":"United States","Paraguay":"Paraguay","Schweiz":"Switzerland","Qatar":"Qatar","Brasilien":"Brazil",
  "Marocko":"Morocco","Haiti":"Haiti","Skottland":"Scotland","Australien":"Australia","Turkiet":"Turkey",
  "Tyskland":"Germany","Curaçao":"Curacao","Nederländerna":"Netherlands","Japan":"Japan",
  "Elfenbenskusten":"Ivory Coast","Ecuador":"Ecuador","Sverige":"Sweden","Tunisien":"Tunisia",
  "Spanien":"Spain","Kap Verde":"Cape Verde","Belgien":"Belgium","Egypten":"Egypt","Saudiarabien":"Saudi Arabia",
  "Uruguay":"Uruguay","Iran":"Iran","Nya Zeeland":"New Zealand","Frankrike":"France","Senegal":"Senegal",
  "Irak":"Iraq","Norge":"Norway","Argentina":"Argentina","Algeriet":"Algeria","Österrike":"Austria",
  "Jordanien":"Jordan","Portugal":"Portugal","DR Kongo":"DR Congo","England":"England","Kroatien":"Croatia",
  "Ghana":"Ghana","Panama":"Panama","Uzbekistan":"Uzbekistan","Colombia":"Colombia","Tjeckien":"Czechia","Sydkorea":"South Korea"
};
function norm(s){return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z]/g,"");}
const ALIAS = {"caboverde":"capeverde","cotedivoire":"ivorycoast","korearepublic":"southkorea",
  "republicofkorea":"southkorea","czechrepublic":"czechia","unitedstates":"usa","usmnt":"usa",
  "congodr":"drcongo","drcongo":"drcongo","democraticrepublicofthecongo":"drcongo","turkiye":"turkey",
  "bosniaandherzegovina":"bosniaherzegovina","bosniaherzegovina":"bosniaherzegovina"};
function canon(name){const n=norm(name);return ALIAS[n]||n;}
function pairKey(a,b){return [canon(a),canon(b)].sort().join("|");}
function fixtureKey(m){return pairKey(SV2EN[m.h]||m.h, SV2EN[m.a]||m.a);}

const liveData = {};
let liveOk = false;

// Snapshot of curated group memberships — authoritative, never overridden by fetched data
const TEAM_GROUPS = {};
M.forEach(m => { if(/^[A-L]$/.test(m.g)){ TEAM_GROUPS[m.h]=m.g; TEAM_GROUPS[m.a]=m.g; } });

async function fetchOneDay(d){
  // one retry — the free API sometimes drops a connection
  for(let attempt=0; attempt<2; attempt++){
    try{
      const r = await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${d}&s=Soccer`);
      if(r.ok) return await r.json();
    }catch(e){ /* retry */ }
    await new Promise(res => setTimeout(res, 400));
  }
  return {events:null};
}

function mergeLiveFromEvent(ev){
  if(!/world cup/i.test(ev.strLeague||"")) return false;
  liveData[pairKey(ev.strHomeTeam, ev.strAwayTeam)] = {
    hs: ev.intHomeScore!=null ? parseInt(ev.intHomeScore,10) : null,
    as: ev.intAwayScore!=null ? parseInt(ev.intAwayScore,10) : null,
    status: ev.strStatus || "", progress: ev.strProgress || ""
  };
  return true;
}

function buildTeamGroups(){ return TEAM_GROUPS; }

function buildFromEspn(ev, hSV, aSV, t2g){
  if(!ev.date) return null;
  const dt = new Date(ev.date);                    // ESPN gives ISO 8601 UTC
  if(isNaN(dt)) return null;
  const hhmm = tzTime.format(dt);
  const helDate = tzHel.format(dt);
  const etDate  = tzEt.format(dt);
  const wd = new Date(etDate+'T12:00:00Z').getUTCDay();
  return {
    date: etDate,
    day: swDay[wd],
    time: hhmm + (helDate > etDate ? '+1' : ''),
    g: (t2g[hSV] && t2g[hSV] === t2g[aSV]) ? t2g[hSV] : '–',   // only tag as group X when BOTH teams are in group X
    h: hSV, a: aSV,
    s: null,
    b: (parseInt(etDate.slice(8,10),10) % 2 === 0) ? 'YLE' : 'MTV'
  };
}

// ESPN scoreboard — primary source for both schedule and live data; CORS open
async function fetchEspn(){
  const base = new Date();
  const dates = [];
  for(let i=-3; i<=20; i++){ const d=new Date(base); d.setDate(d.getDate()+i); dates.push(fmt(d).replace(/-/g,'')); }
  const t2g = buildTeamGroups();
  let any = false, added = 0;
  for(const d of dates){
    try{
      const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}`);
      if(!r.ok) continue;
      const j = await r.json();
      (j.events||[]).forEach(ev => {
        const comp = (ev.competitions||[])[0]; if(!comp) return;
        const home = comp.competitors.find(c=>c.homeAway==='home');
        const away = comp.competitors.find(c=>c.homeAway==='away');
        if(!home || !away) return;
        const state = (comp.status && comp.status.type && comp.status.type.state) || 'pre';
        const detail = (comp.status && comp.status.type && comp.status.type.shortDetail) || '';
        const clock  = (comp.status && comp.status.displayClock) || '';
        let status, progress = '';
        if(state === 'post') status = 'FT';
        else if(state === 'in'){
          if(/^(HT|Halftime)$/i.test(detail)){ status = 'HT'; progress = 'HT'; }
          else {
            status = '1H';                                  // generic "live" — classifier returns "live"
            const mm = clock.match(/^(\d+)/);
            if(mm) progress = mm[1];                         // integer minute
          }
        } else status = 'NS';
        const hName = home.team.displayName || home.team.name;
        const aName = away.team.displayName || away.team.name;
        const key = pairKey(hName, aName);
        liveData[key] = {
          hs: home.score!=null ? parseInt(home.score,10) : null,
          as: away.score!=null ? parseInt(away.score,10) : null,
          status, progress,
          eid: ev.id, state
        };
        any = true;
        // Add fixture if we don't already have it (check M live to avoid races with fetchSchedule)
        if(!M.some(mx => fixtureKey(mx) === key)){
          const fx = buildFromEspn(ev, toSV(hName), toSV(aName), t2g);
          if(fx){ M.push(fx); added++; }
        }
      });
    } catch(e) {}
  }
  return any;
}

async function fetchLive(){
  // Wide window so games from a few days ago refresh too (covers ET-date drift + late API updates)
  const base = new Date();
  const dates = [];
  for(let i=-3; i<=1; i++){ const d=new Date(base); d.setDate(d.getDate()+i); dates.push(fmt(d)); }
  let any = false;
  for(const d of dates){                       // sequential — avoids parallel drops
    const j = await fetchOneDay(d);
    (j.events||[]).forEach(ev => { if(mergeLiveFromEvent(ev)) any = true; });
  }
  if(any) liveOk = true;
  updateStamp(liveOk ? "live" : "fallback");
  render();
}

function classifyStatus(s){
  s = (s||"").toLowerCase();
  if(!s || /not started|^ns$|tbd|postp/.test(s)) return "ns";
  if(/ft|full|finished|aet|pen|after extra|awarded|aban/.test(s)) return "fin";
  return "live";
}

// --- Auto-extend the schedule from the API so the list never runs out ---
const EN2SV = {};
Object.keys(SV2EN).forEach(sv => { EN2SV[canon(SV2EN[sv])] = sv; });
function toSV(en){ return EN2SV[canon(en)] || en; }

const tzTime = new Intl.DateTimeFormat('sv-SE',{timeZone:'Europe/Helsinki',hour:'2-digit',minute:'2-digit',hour12:false});
const tzHel  = new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Helsinki',year:'numeric',month:'2-digit',day:'2-digit'});
const tzEt   = new Intl.DateTimeFormat('en-CA',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'});
const swDay  = ["Sö","Må","Ti","On","To","Fr","Lö"];

function buildFixture(ev){
  if(!ev.strTimestamp) return null;
  const dt = new Date(ev.strTimestamp.replace(' ','T') + 'Z');   // strTimestamp is UTC
  if(isNaN(dt)) return null;
  const hhmm = tzTime.format(dt);
  const helDate = tzHel.format(dt);
  const etDate  = tzEt.format(dt);                 // US matchday — matches curated grouping
  const wd = new Date(etDate+'T12:00:00Z').getUTCDay();
  return {
    date: etDate,
    day: swDay[wd],
    time: hhmm + (helDate > etDate ? '+1' : ''),
    g: (ev.strGroup||'').replace(/[^A-La-l]/g,'').toUpperCase() || '–',
    h: toSV(ev.strHomeTeam),
    a: toSV(ev.strAwayTeam),
    s: (ev.intHomeScore!=null && ev.intAwayScore!=null) ? `${ev.intHomeScore}–${ev.intAwayScore}` : null,
    b: (parseInt(etDate.slice(8,10),10) % 2 === 0) ? 'YLE' : 'MTV'   // YLE/MTV alternate by matchday
  };
}

async function fetchSchedule(){
  const base = new Date();               // fresh each run → window rolls forward a day, every day
  const days = [];
  for(let i=-1; i<=16; i++){ const d = new Date(base); d.setDate(d.getDate()+i); days.push(fmt(d)); }
  let added = 0;
  for(const d of days){
    const j = await fetchOneDay(d);
    (j.events||[]).forEach(ev => {
      if(!mergeLiveFromEvent(ev)) return;          // always refresh score/status, even for known fixtures
      const key = pairKey(ev.strHomeTeam, ev.strAwayTeam);
      if(M.some(mx => fixtureKey(mx) === key)) return;   // race-safe dedupe — check live M
      const fx = buildFixture(ev);
      if(!fx) return;
      M.push(fx);
      added++;
    });
  }
  liveOk = true;
  updateStamp("live");
  render();
}

const now = new Date();
const pad = n => String(n).padStart(2,"0");
const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const TODAY = fmt(now);
const tomorrowDate = new Date(now); tomorrowDate.setDate(tomorrowDate.getDate()+1);
const TOMORROW = fmt(tomorrowDate);
const yesterdayDate = new Date(now); yesterdayDate.setDate(yesterdayDate.getDate()-1);
const YESTERDAY = fmt(yesterdayDate);
const NOW_MIN = now.getHours()*60 + now.getMinutes();

const swDayShort = ["Sö","Må","Ti","On","To","Fr","Lö"];
document.getElementById("header-date").textContent =
  `${dayLabels[swDayShort[now.getDay()]]} ${now.getDate()}.${now.getMonth()+1}.`;

function updateStamp(mode){
  const t = new Date();
  const stamp = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  const el = document.getElementById("updated");
  if(mode === "fallback") el.innerHTML = `<span style="color:var(--muted);">offline · sparade resultat</span>`;
  else el.innerHTML = `<span class="live-dot" style="background:#2ca05a;"></span>live · uppdaterad ${stamp}`;
}

let F = "upcoming";

function passes(m){
  if(F==="all") return true;                              // full archive incl. past
  if(F==="today") return m.date===TODAY;
  if(F==="yle") return m.b==="YLE" && m.date>=YESTERDAY;  // upcoming YLE games
  return m.date>=YESTERDAY;                               // "Kommande" — yesterday onwards
}

function timeCell(t){
  if(t.includes("+1")) return `${t.replace("+1","")}<span class="plus">+1</span>`;
  return t;
}

function kickoffDate(m){
  const dt = new Date(m.date+"T"+m.time.replace("+1","")+":00");
  if(m.time.includes("+1")) dt.setDate(dt.getDate()+1);
  return dt;
}

function clockMinute(m){
  const elapsed = Math.floor((Date.now() - kickoffDate(m).getTime()) / 60000);
  if(elapsed < 0 || elapsed > 130) return null;
  if(elapsed <= 45) return `${Math.max(1,elapsed)}'`;
  if(elapsed < 60) return "HT";
  if(elapsed <= 105) return `${45 + (elapsed-60)}'`;
  return "FT";
}

// Merge curated fixture with any live API data → {phase, score, minute}
function getState(m){
  const live = liveData[fixtureKey(m)];
  if(live){
    const phase = classifyStatus(live.status);
    const score = (live.hs != null && live.as != null) ? `${live.hs}–${live.as}` : (m.s || null);
    if(phase === "live"){
      let minute;
      if(/^\d+$/.test(live.progress)) minute = `${live.progress}'`;
      else if(/^(HT|Halftime|Paus)$/i.test(live.progress) || /^(HT|Halftime)$/i.test(live.status)) minute = "HT";
      else minute = clockMinute(m) || "LIVE";
      if(minute === "FT") minute = "90'";
      return {phase:"live", score: score || "–", minute};
    }
    if(phase === "fin") return {phase:"fin", score: score};
    // API says NS but clock is past kickoff → trust the clock (API status can lag at kickoff)
    const cm = clockMinute(m);
    if(cm !== null && cm !== "FT"){
      return {phase:"live", score: score || "–", minute: cm};
    }
    return {phase:"ns", score:null};
  }
  // No live record — fall back to the clock + any stored score
  const cm = clockMinute(m);
  if(cm !== null && cm !== "FT") return {phase:"live", score: m.s || "–", minute: cm};
  if(m.s) return {phase:"fin", score: m.s};
  if(Date.now() < kickoffDate(m).getTime()) return {phase:"ns", score:null};
  return {phase:"wait", score:null};
}

function statusCell(st){
  if(st.phase === "live"){
    return `<div class="live-cell">
      <span class="live-score">${st.score}</span>
      <span class="live"><span class="live-dot"></span>${st.minute}</span>
    </div>`;
  }
  if(st.phase === "fin" && st.score) return `<div class="score">${st.score}</div>`;
  if(st.phase === "ns") return `<div class="pending">kommer</div>`;
  return `<div class="pending">väntar resultat</div>`;
}

function teamSpan(name){
  const isGer = name === "Tyskland";
  const flag = isGer ? `<span class="flag">🇩🇪</span>` : "";
  return `<button class="team-link${isGer?' is-german':''}" data-team="${name}">${flag}${name}</button>`;
}

function currentTeam(){
  const m = (location.hash||"").match(/^#team=(.+)$/);
  return m ? decodeURIComponent(m[1]) : null;
}

function computeTeamSummary(team){
  let mp=0,w=0,d=0,l=0,gf=0,ga=0,group=null;
  M.forEach(m => {
    if(m.h !== team && m.a !== team) return;
    if(/^[A-L]$/.test(m.g)) group = m.g;
    const st = getState(m);
    if((st.phase !== "fin" && st.phase !== "live") || !st.score) return;
    const p = st.score.split("–").map(s => parseInt(s,10));
    if(p.length !== 2 || p.some(isNaN)) return;
    const isHome = m.h === team;
    const us = isHome ? p[0] : p[1], them = isHome ? p[1] : p[0];
    mp++; gf+=us; ga+=them;
    if(us>them) w++; else if(us<them) l++; else d++;
  });
  return { mp, w, d, l, gf, ga, gd: gf-ga, pts: w*3+d, group };
}

function renderTeamPage(team){
  const root = document.getElementById("sched");
  const matches = M.filter(m => m.h === team || m.a === team)
    .sort((a,b) => kickoffDate(a) - kickoffDate(b));
  const s = computeTeamSummary(team);
  const isGer = team === "Tyskland";
  const flag = isGer ? "🇩🇪 " : "";
  const gdStr = (s.gd>0?"+":"") + s.gd;
  const summary = s.mp
    ? `<div class="team-summary">${s.group?`<span>Grupp <b>${s.group}</b></span>`:""}<span><b>${s.mp}</b> spelade</span><span><b>${s.w}</b> V · <b>${s.d}</b> O · <b>${s.l}</b> F</span><span><b>${s.pts}</b> poäng</span><span>Mål <b>${s.gf}–${s.ga}</b> (${gdStr})</span></div>`
    : `<div class="team-summary">${s.group?`<span>Grupp <b>${s.group}</b></span>`:""}<span>Inga matcher spelade ännu</span></div>`;

  const by = {};
  matches.forEach(m=>{(by[m.date]=by[m.date]||[]).push(m);});
  const keys = Object.keys(by).sort();
  const days = keys.map(d => {
    const list = by[d].map(m => {
      const yleTag = m.b==="YLE" ? `<span class="yle-tag">yle</span>` : "";
      const st = getState(m);
      const isLive = st.phase === "live";
      const hasGer = m.h === "Tyskland" || m.a === "Tyskland";
      return `<div class="row${isLive?" is-live":""}${hasGer&&!isGer?" has-german":""}">
        <span class="t">${timeCell(m.time)}</span>
        <span class="teams">
          ${teamSpan(m.h)}<span class="vs">–</span>${teamSpan(m.a)}
          ${yleTag}
          <span class="grp">${m.g}</span>
        </span>
        ${statusCell(st)}
      </div>`;
    }).join("");
    const dd = d.split("-");
    const dateStr = `${parseInt(dd[2])}.${parseInt(dd[1])}.`;
    let badge = "";
    if(d===TODAY) badge = `<span class="day-today">Idag</span>`;
    else if(d===TOMORROW) badge = `<span class="day-tomorrow">Imorgon</span>`;
    return `<div class="day"><span class="day-name">${dayLabels[by[d][0].day]}</span><span class="day-date">${dateStr}</span>${badge}</div>${list}`;
  }).join("");

  root.innerHTML = `<div class="team-page-head"><button class="back" data-back="1">← Tillbaka</button><h2>${flag}${team}</h2></div>${summary}${days || `<p style="color:var(--muted);font-size:13px;">Inga matcher.</p>`}`;
}

function render(){
  const team = currentTeam();
  const controls = document.querySelector(".controls");
  const legend = document.getElementById("legend");
  const foot = document.getElementById("footnote");
  if(team){
    if(controls) controls.style.display = "none";
    if(legend) legend.style.display = "none";
    if(foot) foot.style.display = "none";
    renderTeamPage(team);
    return;
  }
  if(controls) controls.style.display = "";
  const isFullScreen = F === "grupper" || F === "skyttar";
  if(legend) legend.style.display = isFullScreen ? "none" : "";
  if(foot) foot.style.display = isFullScreen ? "none" : "";
  const playedEl = document.getElementById("played");
  if(playedEl){
    const n = M.filter(m => getState(m).phase === "fin").length;
    const live = M.filter(m => getState(m).phase === "live").length;
    playedEl.textContent = live ? `${live} pågår · ${n} spelade` : `${n} spelade`;
  }
  if(F === "grupper"){
    if(legend) legend.style.display = "none";
    if(foot) foot.style.display = "none";
    renderGroups();
  } else if(F === "skyttar"){
    if(legend) legend.style.display = "none";
    if(foot) foot.style.display = "none";
    renderScorers();
  } else {
    renderSchedule();
  }
}

// --- standings computed live from results ---
function trustedGroup(m){
  // Only accept m.g when both teams genuinely belong to that group per the authoritative map
  if(!/^[A-L]$/.test(m.g)) return null;
  if(TEAM_GROUPS[m.h] && TEAM_GROUPS[m.h] !== m.g) return null;
  if(TEAM_GROUPS[m.a] && TEAM_GROUPS[m.a] !== m.g) return null;
  return m.g;
}

function computeGroups(){
  const G = {};
  M.forEach(m => {
    const g = trustedGroup(m); if(!g) return;
    G[g] = G[g] || {};
    [m.h, m.a].forEach(t => { if(!G[g][t]) G[g][t] = {team:t, mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  });
  M.forEach(m => {
    const g = trustedGroup(m); if(!g) return;
    const st = getState(m);
    if((st.phase !== "fin" && st.phase !== "live") || !st.score) return;  // live games count provisionally
    const p = st.score.split("–").map(s => parseInt(s,10));
    if(p.length !== 2 || p.some(isNaN)) return;
    const [hs, as_] = p;
    const H = G[g][m.h], A = G[g][m.a];
    if(!H || !A) return;
    H.mp++; A.mp++; H.gf+=hs; H.ga+=as_; A.gf+=as_; A.ga+=hs;
    if(hs>as_){ H.w++; A.l++; H.pts+=3; }
    else if(hs<as_){ A.w++; H.l++; A.pts+=3; }
    else { H.d++; A.d++; H.pts++; A.pts++; }
  });
  return G;
}

function renderGroups(){
  const root = document.getElementById("sched");
  const G = computeGroups();
  const letters = Object.keys(G).sort();
  if(!letters.length){ root.innerHTML = `<p style="font-size:13px;color:var(--muted);padding:1rem 0;">Inga grupper ännu.</p>`; return; }
  const liveTeams = new Set();
  M.forEach(m => { if(getState(m).phase === "live"){ liveTeams.add(m.h); liveTeams.add(m.a); } });

  const sortFn = (a,b) => b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf || a.team.localeCompare(b.team,'sv');
  const sorted = {};
  letters.forEach(L => sorted[L] = Object.values(G[L]).sort(sortFn));

  // top 2 of each group + the 8 best third-placed teams advance to the round of 32
  const thirds = letters.filter(L => sorted[L].length >= 3).map(L => ({L, t: sorted[L][2]}));
  thirds.sort((a,b) => b.t.pts-a.t.pts || (b.t.gf-b.t.ga)-(a.t.gf-a.t.ga) || b.t.gf-a.t.gf);
  const qualThird = new Set(thirds.slice(0,8).map(x => x.L));

  const cards = letters.map(L => {
    const teams = sorted[L];
    const rows = teams.map((t,i) => {
      const advancing = i < 2 || (i === 2 && qualThird.has(L));
      const isLive = liveTeams.has(t.team);
      const cls = [advancing ? "adv" : "", isLive ? "playing" : ""].filter(Boolean).join(" ");
      const dot = isLive ? `<span class="live-dot"></span>` : "";
      const gd = t.gf - t.ga; const gdStr = (gd>0?"+":"") + gd;
      return `<tr class="${cls}">
        <td><span class="gpos">${i+1}</span></td>
        <td class="team">${dot}${teamSpan(t.team)}</td>
        <td>${t.mp}</td>
        <td>${gdStr}</td>
        <td class="gpts">${t.pts}</td>
      </tr>`;
    }).join("");
    return `<div class="gcard">
      <h4>Grupp ${L}</h4>
      <table class="gtable">
        <colgroup><col class="c-pos"><col><col class="c-n"><col class="c-n"><col class="c-p"></colgroup>
        <thead><tr><th></th><th class="lft">Lag</th><th>S</th><th>MS</th><th>P</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join("");
  root.innerHTML = `<div class="groups">${cards}</div>
    <p class="footnote" style="margin-top:20px;">S = spelade, MS = målskillnad, P = poäng. <span style="color:#2ca05a;">●</span> går vidare (topp 2 + 8 bästa treor). <span style="color:var(--today-accent);">●</span> spelar just nu — live-resultat räknas med.</p>`;
}

// --- Top scorers — fetched lazily from ESPN match summaries; cached in memory ---
const scorerCache = {};   // eventId -> [{ player, team, ownGoal }]
let scorerInflight = false;

async function fetchMatchScorers(eventId){
  if(scorerCache[eventId]) return scorerCache[eventId];
  try{
    const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`);
    if(!r.ok) return [];
    const j = await r.json();
    const goals = [];
    (j.keyEvents||[]).forEach(p => {
      if(!p.scoringPlay) return;
      const text = p.text || '';
      const team = (p.team||{}).displayName || '';
      const own  = /own[- ]goal/i.test(text);
      // "Goal! X 1, Y 0. Player Name (Country) ..."
      const m = text.match(/\.\s+([^.()]+?)\s*\(([^)]+)\)/);
      if(m){
        goals.push({ player: m[1].trim(), team, ownGoal: own });
      }
    });
    scorerCache[eventId] = goals;
    return goals;
  }catch(e){ return []; }
}

async function aggregateScorers(){
  const board = {};
  // Find finished/live matches with an event ID (via liveData)
  const tasks = [];
  M.forEach(m => {
    const live = liveData[fixtureKey(m)];
    if(!live || !live.eid) return;
    if(live.state !== 'in' && live.state !== 'post') return;
    tasks.push(live.eid);
  });
  // Parallel — ESPN handles burst fine; cache makes subsequent renders instant
  const results = await Promise.all([...new Set(tasks)].map(fetchMatchScorers));
  for(const goals of results){
    for(const g of goals){
      if(g.ownGoal) continue;          // exclude own goals from leaderboard
      const key = g.player.toLowerCase();
      if(!board[key]) board[key] = { name: g.player, team: g.team, goals: 0 };
      board[key].goals++;
    }
  }
  return Object.values(board).sort((a,b) => b.goals - a.goals || a.name.localeCompare(b.name,'sv'));
}

async function renderScorers(){
  const root = document.getElementById("sched");
  if(scorerInflight){ return; }
  // initial loading state if cache empty
  const cached = Object.keys(scorerCache).length > 0;
  if(!cached){
    root.innerHTML = `<div class="scorer-loading">Hämtar målgörare…</div>`;
  }
  scorerInflight = true;
  try{
    const list = await aggregateScorers();
    if(F !== "skyttar") return;     // user navigated away
    if(!list.length){
      root.innerHTML = `<div class="scorer-loading">Inga målgörare ännu.</div>`;
      return;
    }
    const html = list.map((s, i) => `
      <div class="scorer-row">
        <span class="scorer-rank">${i+1}</span>
        <span><span>${s.name}</span><span class="scorer-team">${toSV(s.team)}</span></span>
        <span class="scorer-goals">${s.goals}<span class="label">${s.goals===1?'mål':'mål'}</span></span>
      </div>`).join("");
    root.innerHTML = `<div class="scorers">${html}</div>
      <p class="footnote" style="margin-top:20px;">Skytteliga baserad på spelade och pågående matcher (ESPN). Självmål räknas inte i listan.</p>`;
  } finally {
    scorerInflight = false;
  }
}

function renderSchedule(){
  const root = document.getElementById("sched");
  const by = {};
  M.filter(passes).forEach(m=>{(by[m.date]=by[m.date]||[]).push(m);});
  Object.values(by).forEach(list => list.sort((a,b)=>kickoffDate(a)-kickoffDate(b)));
  const keys = Object.keys(by).sort();
  if(!keys.length){root.innerHTML = `<p style="font-size:13px;color:var(--muted);padding:1rem 0;">Inga matcher.</p>`;return;}
  root.innerHTML = keys.map(d=>{
    const isToday = d===TODAY;
    const list = by[d].map(m=>{
      const yleTag = m.b==="YLE" ? `<span class="yle-tag">yle</span>` : "";
      const st = getState(m);
      const isLive = st.phase === "live";
      const hasGer = m.h === "Tyskland" || m.a === "Tyskland";
      return `<div class="row${isLive?" is-live":""}${hasGer?" has-german":""}">
        <span class="t">${timeCell(m.time)}</span>
        <span class="teams">
          ${teamSpan(m.h)}<span class="vs">–</span>${teamSpan(m.a)}
          ${yleTag}
          <span class="grp">${m.g}</span>
        </span>
        ${statusCell(st)}
      </div>`;
    }).join("");
    const dd = d.split("-");
    const dateStr = `${parseInt(dd[2])}.${parseInt(dd[1])}.`;
    let badge = "";
    if(isToday) badge = `<span class="day-today">Idag</span>`;
    else if(d===TOMORROW) badge = `<span class="day-tomorrow">Imorgon</span>`;
    return `<div class="day${isToday?" is-today":""}"><span class="day-name">${dayLabels[by[d][0].day]}</span><span class="day-date">${dateStr}</span>${badge}</div>${list}`;
  }).join("");
}

document.querySelectorAll(".tab").forEach(b=>{
  b.addEventListener("click",()=>{
    if(currentTeam()){ history.replaceState(null,"","#"); }   // exit team view first
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    F = b.dataset.f;
    render();
  });
});
document.addEventListener("click", e => {
  const t = e.target.closest("[data-team]");
  if(t){ e.preventDefault(); location.hash = "team=" + encodeURIComponent(t.dataset.team); window.scrollTo(0,0); return; }
  const back = e.target.closest("[data-back]");
  if(back){ e.preventDefault(); history.replaceState(null,"","#"); render(); }
});
window.addEventListener("hashchange", render);
async function refreshAll(){
  await fetchLive();                                 // TheSportsDB first — provides coverage for older days
  await fetchEspn();                                 // ESPN second so it overrides with fresher live data
  liveOk = true; updateStamp("live"); render();
}
render();
updateStamp("live");
fetchSchedule();                      // pull upcoming fixtures so the list stays ahead
refreshAll();                         // initial combined live pull
setInterval(refreshAll, 45000);       // refresh scores every 45s (ESPN updates more often than tsdb did)
setInterval(fetchSchedule, 1800000);  // refresh upcoming schedule every 30 min
setInterval(render, 20000);           // re-tick live minutes between pulls
</script>
